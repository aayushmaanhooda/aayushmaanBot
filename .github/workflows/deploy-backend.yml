name: Deploy Backend on Resume/Knowledge Update

on:
  push:
    branches: [master]
    paths:
      - 'backend/app/aayushmaan.md'
      - 'frontend/src/assets/resume.pdf'
      - 'backend/app/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /home/ubuntu/aayushmaanBot
            git fetch origin master
            git reset --hard origin/master
            rm -f /home/ubuntu/aayushmaanBot/backend/app/indexed_docs.json
            sudo systemctl restart aayushbot
            echo "Waiting for server to start..."
            for i in 1 2 3 4 5 6; do
              sleep 15
              if curl -sf http://localhost:8000/health; then
                echo "Deploy successful!"
                exit 0
              fi
              echo "Attempt $i: server not ready yet..."
            done
            echo "Server failed to start after 90s"
            exit 1

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Test /health endpoint
        run: |
          RESPONSE=$(curl -s --connect-timeout 15 --max-time 30 -o /tmp/health.json -w "%{http_code}" \
            "${{ secrets.EC2_BASE_URL }}/health")
          echo "Status: $RESPONSE"
          cat /tmp/health.json
          [ "$RESPONSE" = "200" ] && echo "Health check passed" || { echo "Health check failed"; exit 1; }

      - name: Test /chat endpoint
        run: |
          RESPONSE=$(curl -s --connect-timeout 15 --max-time 120 -o /tmp/chat.json -w "%{http_code}" \
            -X POST "${{ secrets.EC2_BASE_URL }}/chat" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.SECURITY_API_KEY }}" \
            -d '{"message": "Who is Aayushmaan?", "thread_id": "ci-deploy-test"}')
          echo "Status: $RESPONSE"
          cat /tmp/chat.json
          [ "$RESPONSE" = "200" ] && echo "Chat endpoint passed" || { echo "Chat endpoint failed"; exit 1; }
